<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BLINK! Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    html, body {
    overflow: hidden;
    margin: 0;
    padding: 0;
    font-family: 'Zen Dots', sans-serif !important;
    background: linear-gradient(to bottom, #FFFFFF, #0F4490);
    color: #fff;
    text-align: center;
    cursor: url('https://cdn.custom-cursor.com/db/9814/32/starter-3d-holographic-pixel-cursor.png'), auto;
    }

    #bg-wrap {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      }
    #bg-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      }

    }
    h1 {
    margin: 20px 0;
    font-size: 60x;
    }
    .subtitle {  
    <!-- rubah style dan warna subtitle sonystark disini -->
      font-family: 'Zen Dots', sans-serif;
      font-weight: bold;
      font-size: 18px;
      margin-top: -35px;
      margin-bottom: 40px;
      color: #000;
      opacity: 0.5;
      }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      }
    .select-wrapper {
      position: relative;
      width: 250px;
      }
    .select-wrapper::after {
      content: '▼';
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      pointer-events: none;
      color: #000;
      font-size: 14px;
    }
    
select.custom-select {
appearance: none;
    font-family: 'Montserrat', sans-serif !important;
    width: 100%;
    font-size: 16px;
    padding: 12px 20px;
    border-radius: 9999px;
    border: none;
    background: linear-gradient(45deg, #fff, #eee);
    color: #000;
    font-weight: bold;
    box-shadow: 0 4px 0 #aaa;
    cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer;
    }
    select.custom-select:hover {
      filter: brightness(1.1);
      box-shadow: 0 2px 0 #fff;
      transform: scale(1.03);
      }
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      }
    .file-input-wrapper input[type=file] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer;
      }
    .file-input-label {
      font-family: 'Montserrat', sans-serif !important;
	  background: linear-gradient(45deg, #1ca9c9, #0047ab);
      color: white;
      padding: 12px 24px;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 4px 0 #003366;
      cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
    .file-input-label:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
      }
    .file-input-label:active {
      transform: scale(0.95);
      box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
      }
      
#printBtn.green-button {
  font-family: 'Montserrat', sans-serif !important;
  background: linear-gradient(45deg, #1ca9c9, #0047ab);
  color: white;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 9999px;
  box-shadow: 0 4px 0 #003366;
  cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
#printBtn.green-button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
  }
#printBtn.green-button:active {
  transform: scale(0.95);
  box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
  }

#downloadBtn{
  font-family: 'Montserrat', sans-serif !important;
  background: linear-gradient(45deg, #1ca9c9, #0047ab);
  color: white;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 9999px;
  box-shadow: 0 4px 0 #003366;
  cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
#downloadBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
  }
#downloadBtn:active {
  transform: scale(0.95);
  box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.2);
  }
#previewContainer {
  display: flex;
  justify-content: center;
  }
#canvasWrapper {
  position: relative;
  transform: scale(0.35);
  transform-origin: top center;
  }
#canvas {
  display: block;
  border: 2px solid #000;
  background: rgba(255, 255, 255, 0.2);
  }
  .drop-zone {
    position: absolute;
    cursor: url('https://cdn.custom-cursor.com/db/9814/32/starter-3d-holographic-pixel-cursor.png'), pointer;
    }
  .drop-zone::before {
    content: attr(data-label);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #333;
    font-size: 60px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    white-space: pre-line;
    }
  .drop-zone input {
    display: none;
    }
#overlayMessage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: bold;
  color: #333;
  pointer-events: none;
  z-index: 10;
  white-space: pre-line;
  }

/* Tombol WhatsApp */
.Btn {
  font-family: 'Montserrat', sans-serif !important;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  width: 70px;
  height: 70px;
  border: none;
  border-radius: 50%;
  cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'),  pointer;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  overflow: hidden;
  transition-duration: 0.3s;
  box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.199);
  background: linear-gradient(45deg, #25d366, #128c7e);
  }

.sign {
  width: 100%;
  transition-duration: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  }

.sign svg {
  width: 30px;
  }

.sign svg path {
  fill: white;
  }
  
.text {
  position: absolute;
  right: 0%;
  width: 0%;
  opacity: 0;
  color: white;
  font-size: 1.6em;
  font-weight: 600;
  transition-duration: 0.3s;
  }

.Btn:hover {
  width: 230px;
  border-radius: 40px;
  transition-duration: 0.3s;
  }

.Btn:hover .sign {
  width: 30%;
  transition-duration: 0.3s;
  padding-left: 10px;
  }

.Btn:hover .text {
  opacity: 1;
  width: 70%;
  transition-duration: 0.3s;
  padding-right: 10px;
  }
  
.Btn:active {
  transform: translate(2px, 2px);
  }

/* Overlay gelap */
.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.8);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
  }

/* Card container dengan animasi */
.popup-card {
  opacity: 0;
  transform: scale(0.95);
  transition: opacity 0.4s ease, transform 0.3s ease;
  }

/* Saat aktif */
.popup-overlay.active {
  opacity: 1;
  visibility: visible;
  }
  
.popup-overlay.active .popup-card {
  opacity: 1;
  transform: scale(1);
  }

.card {
  transform: scale(1.0);
  position: relative;
  width: 400px;
  height: 500px;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  }

.bg {
  transform: scale(1.0);
  position: absolute;
  top: 10px;
  left: 10px;
  width: 380px;
  height: 480px;
  z-index: 2;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(54px);
  border-radius: 10px;
  outline: 2px solid white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  box-sizing: border-box;
  }

.blob {
  transform: scale(1.0);
  position: absolute;
  z-index: 1;
  top: 50%;
  left: 50%;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background-color: #25d366;
  opacity: 1;
  filter: blur(30px);
  animation: blob-bounce 5s infinite ease;
  }

@keyframes blob-bounce {
  0% { transform: translate(-100%, -100%) translate3d(0, 0, 0); }
  25% { transform: translate(-100%, -100%) translate3d(100%, 0, 0); }
  50% { transform: translate(-100%, -100%) translate3d(100%, 100%, 0); }
  75% { transform: translate(-100%, -100%) translate3d(0, 100%, 0); }
  100% { transform: translate(-100%, -100%) translate3d(0, 0, 0); }
  }

.popup-text {
    font-size: 16px;
    color: #333;
    text-align: center;
    margin: 4px 0;
    }
.bg img {
    width: 100%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
    margin: 8px 0;
    }
  
  </style>
</head>
<body oncontextmenu = "return false" oncopy="return false" oncut="return false" onpaste="return false">

<button class="Btn">
  <div class="sign">
    <svg class="socialSvg whatsappSvg" viewBox="0 0 16 16">
      <path
        d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"

<!-- Overlay sebagai latar gelap -->
<div id="popupOverlay" class="popup-overlay" onclick="hidePopup()">
  <!-- Card container -->
  <div id="popupCard" class="popup-card" onclick="event.stopPropagation();">
    <div class="card">
      <div class="bg">

<h1 style="color: black; font-size: 54px;">BLINK! Photo Collage</h1>
  <p class="subtitle">Trial Demo Version</p>

<div class="controls">
  <div class="select-wrapper">
    <select id="frameSelector" class="custom-select">
      <option value="1photo">1 Photo Portrait</option>
      <option value="1photolandscape">1 Photo Landscape</option>
      <option value="2photo">2 Photo Polaroid</option>
	  <option value="Bundling">Bundling 3in1</option>
      <option value="4photo">4 Photo Portrait</option>
      <option value="6photo">6 Photo Portrait</option>
      <option value="filmstrip">Filmstrip Portrait</option>
    </select>
  </div>

  <div class="file-input-wrapper">
    <label class="file-input-label" for="frameInput">Pick a Frame</label>
    <input type="file" id="frameInput" accept="image/png">
  </div>

  <button id="downloadBtn">Export</button>
<button id="printBtn" class="green-button">Print</button>
</div>

<div id="previewContainer">
  <div id="canvasWrapper">
    <canvas id="canvas" width="1200" height="1800"></canvas>
    <div id="overlayMessage">Pick a Frame</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasWrapper = document.getElementById('canvasWrapper');
const overlay = document.getElementById('overlayMessage');
let photos = [];
let frameImg = null;

function clearDropZones() {
  canvasWrapper.querySelectorAll('.drop-zone').forEach(zone => zone.remove());
}

function setupDropZone(id, index, x, y, w, h) {
  const div = document.createElement('div');
  div.className = 'drop-zone';
  div.id = id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.style.width = w + 'px';
  div.style.height = h + 'px';
  div.setAttribute('data-label', '');

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  div.appendChild(input);

  input.addEventListener('change', () => handleFile(input.files[0], index, x, y, w, h, div));
  div.addEventListener('click', () => input.click());
  div.addEventListener('dragover', e => e.preventDefault());
  div.addEventListener('drop', e => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0], index, x, y, w, h, div);
  });

  canvasWrapper.appendChild(div);
}

function handleFile(file, index, x, y, w, h, zoneDiv) {
  const img = new Image();
  img.onload = () => {
    photos[index] = { img, x, y, w, h };
    zoneDiv.setAttribute('data-label', '');
    drawCanvas();
  };
  img.src = URL.createObjectURL(file);
}

function drawImageCover(ctx, img, x, y, w, h) {
  const imgAspect = img.width / img.height;
  const boxAspect = w / h;

  let sw, sh, sx, sy;
  if (imgAspect > boxAspect) {
    sh = img.height;
    sw = sh * boxAspect;
    sx = (img.width - sw) / 2;
    sy = 0;
  } else {
    sw = img.width;
    sh = sw / boxAspect;
    sx = 0;
    sy = (img.height - sh) / 2;
  }

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  photos.forEach(p => {
    if (p) drawImageCover(ctx, p.img, p.x, p.y, p.w, p.h);
  });
  if (frameImg) ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  drawCanvas();
  const link = document.createElement('a');
  link.download = 'snapstudio_photoframe.jpg';
  link.href = canvas.toDataURL('image/jpeg', 1.0);
  link.click();
});

document.getElementById('frameInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const img = new Image();
  img.onload = () => {
    frameImg = img;
    overlay.style.display = 'none';
    // show labels on dropzones now that frame is selected
    canvasWrapper.querySelectorAll('.drop-zone').forEach(z => {
      z.setAttribute('data-label', 'Drop Photo or Click to Load');
    });
    drawCanvas();
  };
  img.src = URL.createObjectURL(file);
});

document.getElementById('frameSelector').addEventListener('change', e => {
  const val = e.target.value;
  clearDropZones();
  frameImg = null;
  overlay.style.display = 'block';
  photos = [];

  const templates = {
    '1photo': { w: 1200, h: 1800, zones: [[60, 59, 1080, 1573]] },
    '1photolandscape': { w: 1800, h: 1200, zones: [[58, 59, 1683, 994]] },
    '2photo': { w: 1800, h: 1200, zones: [[309, 160, 543, 732], [949, 160, 543, 732]] },
	'Bundling': { w: 1200, h: 1800, zones: [[117, 149, 967, 698], [117, 887, 465, 698], [619, 887, 465, 698]] },
    '4photo': { w: 1200, h: 1800, zones: [[117, 149, 465, 698], [619, 149, 465, 698], [117, 887, 465, 698], [619, 887, 465, 698]] },
    '6photo': { w: 1200, h: 1800, zones: [[59, 118, 513, 405], [629, 118, 513, 405], [59, 581, 513, 405], [629, 581, 513, 405], [59, 1045, 513, 405], [629, 1045, 513, 405]] },
    'filmstrip': { w: 1200, h: 1800, zones: [[58, 88, 485, 324], [659, 88, 485, 324], [58, 442, 485, 324], [659, 442, 485, 324], [58, 794, 485, 324], [659, 794, 485, 324], [58, 1145, 485, 324], [659, 1145, 485, 324]] }
  };

  const t = templates[val];
  canvas.width = t.w;
  canvas.height = t.h;
  canvas.style.width = t.w + 'px';
  canvas.style.height = t.h + 'px';

  t.zones.forEach((z, i) => setupDropZone(`drop${i + 1}`, i, ...z));
  drawCanvas();
});

document.getElementById('frameSelector').dispatchEvent(new Event('change'));

document.getElementById('printBtn').addEventListener('click', () => {
  drawCanvas();
  const win = window.open('', '_blank');
  const imgData = canvas.toDataURL('image/jpeg', 1.0);
  win.document.write('<html><head><title>Print Preview</title></head><body style="margin:0;"><img src="' + imgData + '" style="width:317.4996mm;"></body></html>');
  win.document.close();
});

function togglePopup() {
  const popup = document.getElementById("popupCard");
  popup.style.display = popup.style.display === "none" ? "block" : "none";
}

function showPopup() {
  const overlay = document.getElementById("popupOverlay");
  overlay.classList.add("active");
}

function hidePopup() {
  const overlay = document.getElementById("popupOverlay");
  overlay.classList.remove("active");
}


</script>
</body>
