<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flashpop Studio</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/iLRxFPp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Poppins&display=swap" rel="stylesheet">
  <style>
    html, body {
    overflow: hidden;
    margin: 0;
    padding: 0;
    font-family: "Quicksand", sans-serif;
    color: #fff;
    text-align: center;
    cursor: url('https://cdn.custom-cursor.com/db/9814/32/starter-3d-holographic-pixel-cursor.png'), auto;
	  -webkit-user-select: none; /* Chrome, Safari */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE/Edge lama */
    user-select: none;         /* Standar */
    }
    body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background: #ff3dc0; z-index:-2; }
    
    body::after { content: ""; position: fixed; top: 90%; left: 50%; transform: translate(-50%,-50%); width: 1500px; height: 350%; background-image: url("https://i.imgur.com/mdnV0i9.png"); background-size: contain; background-repeat: no-repeat; background-position: center; filter: blur(70px); opacity: 0.8; z-index: -1; pointer-events: none; }
    
    .noise-layer { position:fixed; top:0; left:0; width:100%; height:100%; background-image:url("data:image/svg+xml;charset=utf-8;base64,PHN2ZyB2aWV3Qm94PScwIDAgNTEyIDUxMicgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz4KICA8ZmlsdGVyIGlkPSdub2lzZUZpbHRlcic+CiAgICA8ZmVUdXJidWxlbmNlIAogICAgICB0eXBlPSdmcmFjdGFsTm9pc2UnIAogICAgICBiYXNlRnJlcXVlbmN5PScwLjcnCiAgICAgIG51bU9jdGF2ZXM9JzMnIAogICAgICBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+CiAgICA8ZmVDb2xvck1hdHJpeCBpbj0idHVyYnVsZW5jZSIgdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPgoKICAgIDxmZUNvbXBvbmVudFRyYW5zZmVyPgogICAgICA8ZmVGdW5jUiB0eXBlPSJkaXNjcmV0ZSIgdGFibGVWYWx1ZXM9IjAgMSIgLz4KICAgICAgPGZlRnVuY0cgdHlwZT0iZGlzY3JldGUiIHRhYmxlVmFsdWVzPSIwIDEiIC8+CiAgICAgIDxmZUZ1bmNCIHR5cGU9ImRpc2NyZXRlIiB0YWJsZVZhbHVlcz0iMCAxIiAvPgogICAgPC9mZUNvbXBvbmVudFRyYW5zZmVyPgogIDwvZmlsdGVyPgogIAogIDxyZWN0IHdpZHRoPScxMDAlJyBoZWlnaHQ9JzEwMCUnIGZpbHRlcj0ndXJsKCNub2lzZUZpbHRlciknLz4KPC9zdmc+"); opacity:0.08; z-index:-1; pointer-events:none; }
    
    #bg-wrap { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; overflow: hidden; }
    #bg-wrap svg { width: 100%; height: 100%; display: block; } }

    h1 { margin: 20px 0; font-size: 60px; }
    .logo-banner { width: 460px; height: auto; margin-top: 20px; margin-bottom: 5px; }
    .subtitle { font-family: "Poppins", sans-serif !important; font-weight: 500; font-size: 12px; letter-spacing: 1px; margin-top: 5px; margin-bottom: 15px; color: white; opacity: 0.7; }
    .controls { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .select-wrapper { position: relative; width: 250px; }
    .select-wrapper::after { content: '▼'; position: absolute; top: 50%; right: 20px; transform: translateY(-50%); pointer-events: none; color: #000; font-size: 14px; }
    
    select.custom-select { appearance: none; font-family: 'Comfortaa', sans-serif !important; width: 100%; font-size: 16px; padding: 12px 20px; border-radius: 9999px; border: 3px solid #e279b4; background: white; color: none; font-weight: bold; box-shadow: 0 4px 0 #e279b4; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; }
    select.custom-select:hover { filter: brightness(1.1); box-shadow: 0 2px 0 #fff; transform: scale(1.03); }
    
    .file-input-wrapper { position: relative; }
    .file-input-wrapper input[type=file] {position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; }
    
    #templatePick { font-family: 'Quicksand', sans-serif !important; font-weight: bold; background: white; color: #e279b4; padding: 12px 24px; border-radius: 9999px; border: 3px solid #f2b929; font-size: 16px; box-shadow: 0 4px 0 #f2b929; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; transition: transform 0.1s ease; }
    #templatePick:hover { transform: translateY(-0.33em); }
    #templatePick:active { transform: translateY(0); }
      
    #printBtn.green-button { font-family: 'Quicksand', sans-serif !important; background: white; color: #e279b4; padding: 12px 24px; font-size: 16px; font-weight: bold; border: 3px solid #f2b929; border-radius: 9999px; box-shadow: 0 4px 0 #f2b929; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; transition: transform 0.1s ease; }
    #printBtn.green-button:hover { transform: translateY(-0.33em); }
    #printBtn.green-button:active { transform: translateY(0); }

    #downloadBtn { font-family: 'Quicksand', sans-serif !important; background: white; color: #e279b4; padding: 12px 24px; font-size: 16px; font-weight: bold; border: 3px solid #f2b929; border-radius: 9999px; box-shadow: 0 4px 0 #f2b929; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; transition: transform 0.1s ease; }
    #downloadBtn:hover { transform: translateY(-0.33em); }
    #downloadBtn:active { transform: translateY(0); }
    
    #previewContainer { display: flex; justify-content: center; }
    
    #canvasWrapper { position: relative; transform: scale(0.35); transform-origin: top center; }
    #canvas { display: block; border: 2px solid #000; background: rgba(255, 255, 255, 0.2); }
    
    .drop-zone { position: absolute; cursor: url('https://cdn.custom-cursor.com/db/9814/32/starter-3d-holographic-pixel-cursor.png'), pointer; }
    .drop-zone::before { content: attr(data-label); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #333; font-size: 60px; font-weight: bold; text-align: center; pointer-events: none; white-space: pre-line; }
    .drop-zone input { display: none; }

    #overlayMessage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #333; pointer-events: none; z-index: 10; white-space: pre-line; }

    /* Tombol WhatsApp */
    .Btn { font-family: 'Montserrat', sans-serif !important; display: flex; align-items: center; justify-content: flex-start; width: 70px; height: 70px; border: none; border-radius: 50%; cursor: url('https://cdn.custom-cursor.com/db/9813/32/starter-3d-holographic-pixel-pointer.png'), pointer; position: fixed; bottom: 20px; right: 20px; z-index: 9999; overflow: hidden; transition-duration: 0.3s; box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.199); background: linear-gradient(45deg, #25d366, #128c7e); }

    .sign { width: 100%; transition-duration: 0.3s; display: flex; align-items: center; justify-content: center; }
    .sign svg { width: 30px; }
    .sign svg path { fill: white; }
  
    .text { position: absolute; right: 0%; width: 0%; opacity: 0; color: white; font-size: 1.6em; font-weight: 600; transition-duration: 0.3s; }

    .Btn:hover { width: 230px; border-radius: 40px; transition-duration: 0.3s; }
    .Btn:hover .sign { width: 30%; transition-duration: 0.3s; padding-left: 10px; }
    .Btn:hover .text { opacity: 1; width: 70%; transition-duration: 0.3s; padding-right: 10px; }
    .Btn:active { transform: translate(2px, 2px); }

    /* Overlay gelap */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }

    /* Card container dengan animasi */
    .popup-card { opacity: 0; transform: scale(0.95); transition: opacity 0.4s ease, transform 0.3s ease; }

    /* Saat aktif */
    .popup-overlay.active { opacity: 1; visibility: visible; }
    .popup-overlay.active .popup-card { opacity: 1; transform: scale(1); }

    .card { transform: scale(1.0); position: relative; width: 400px; height: 500px; border-radius: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; }

    .bg { transform: scale(1.0); position: absolute; top: 10px; left: 10px; width: 380px; height: 480px; z-index: 2; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(54px); border-radius: 10px; outline: 2px solid white; display: flex; align-items: center; justify-content: space-between; padding: 16px; box-sizing: border-box; }

    .blob { transform: scale(1.0); position: absolute; z-index: 1; top: 50%; left: 50%; width: 350px; height: 350px; border-radius: 50%; background-color: #25d366; opacity: 1; filter: blur(30px); animation: blob-bounce 5s infinite ease; }

    @keyframes blob-bounce {
      0% { transform: translate(-100%, -100%) translate3d(0, 0, 0); }
      25% { transform: translate(-100%, -100%) translate3d(100%, 0, 0); }
      50% { transform: translate(-100%, -100%) translate3d(100%, 100%, 0); }
      75% { transform: translate(-100%, -100%) translate3d(0, 100%, 0); }
      100% { transform: translate(-100%, -100%) translate3d(0, 0, 0); }
      }
    
    #printArea { display: none; }
    @media print { body * { height: 6in; overflow: hidden; visibility: hidden; }
    #printArea { display: block; position: fixed; top: 0; left: 0; width: 4in; height: 6in; }
    #printArea * { visibility: visible; }
    #printImage { width: 100%; height: 100%; object-fit: contain; } }
    
    .popup-text { font-size: 16px; color: #333; text-align: center; margin: 4px 0; }
    
    .bg img { width: 100%; max-height: 90%; object-fit: contain; border-radius: 8px; margin: 8px 0; }
  
  </style>
</head>
<body oncontextmenu = "return false" oncopy="return false" oncut="return false" onpaste="return false">

<!-- Tombol WhatsApp di kanan bawah -->
<button class="Btn">
  <div class="sign">
    <svg class="socialSvg whatsappSvg" viewBox="0 0 16 16">
      <path
        d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"

<!-- Overlay sebagai latar gelap -->
<div id="popupOverlay" class="popup-overlay" onclick="hidePopup()">
  <!-- Card container -->
  <div id="popupCard" class="popup-card" onclick="event.stopPropagation();">
    <div class="card">
      <div class="bg">
        <img src="https://i.imgur.com/sax0rxD.png"
             alt="Scan Me">
      </div>
      <div class="blob"></div>

  </div>
</div>

<div class="noise-layer"></div>
  
<img class="logo-banner" src="https://i.imgur.com/2wPK86H.png" alt="Flashpop Studio">
  <p class="subtitle">powered by @Blink.photobox</p>

<div class="controls">
  <div class="select-wrapper">
    <select id="frameSelector" class="custom-select">
      <option value="1photo">1 Photo Portrait</option>
      <option value="1photolandscape">1 Photo Landscape</option>
      <option value="2photo">2 Photo Polaroid</option>
	    <option value="Bundling">Bundling 3in1</option>
      <option value="4photo">4 Photo Portrait</option>
      <option value="6photo">6 Photo Portrait</option>
      <option value="filmstrip">Filmstrip Portrait</option>
    </select>
  </div>

  <div class="file-input-wrapper">
    <button id="templatePick">Pick a Frame</button>
    <input type="file" id="frameInput" accept="image/png" hidden>
  </div>

  <button id="downloadBtn">Export</button>
  <button id="printBtn" class="green-button">Print</button>
</div>
  
  <div id="printArea"><img id="printImage"></div>

<div id="previewContainer">
  <div id="canvasWrapper">
    <canvas id="canvas" width="1200" height="1800"></canvas>
    <div id="overlayMessage">Pick a Frame</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasWrapper = document.getElementById('canvasWrapper');
const overlay = document.getElementById('overlayMessage');
let photos = [];
let frameImg = null;

function clearDropZones() {
  canvasWrapper.querySelectorAll('.drop-zone').forEach(zone => zone.remove());
}

function setupDropZone(id, index, x, y, w, h) {
  const div = document.createElement('div');
  div.className = 'drop-zone';
  div.id = id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.style.width = w + 'px';
  div.style.height = h + 'px';
  div.setAttribute('data-label', '');

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  div.appendChild(input);

  input.addEventListener('change', () => handleFile(input.files[0], index, x, y, w, h, div));
  div.addEventListener('click', () => input.click());
  div.addEventListener('dragover', e => e.preventDefault());
  div.addEventListener('drop', e => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0], index, x, y, w, h, div);
  });

  canvasWrapper.appendChild(div);
}

function handleFile(file, index, x, y, w, h, zoneDiv) {
  const img = new Image();
  img.onload = () => {
    photos[index] = { img, x, y, w, h };
    zoneDiv.setAttribute('data-label', '');
    drawCanvas();
  };
  img.src = URL.createObjectURL(file);
}

function drawImageCover(ctx, img, x, y, w, h) {
  const imgAspect = img.width / img.height;
  const boxAspect = w / h;

  let sw, sh, sx, sy;
  if (imgAspect > boxAspect) {
    sh = img.height;
    sw = sh * boxAspect;
    sx = (img.width - sw) / 2;
    sy = 0;
  } else {
    sw = img.width;
    sh = sw / boxAspect;
    sx = 0;
    sy = (img.height - sh) / 2;
  }

  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  photos.forEach(p => {
    if (p) drawImageCover(ctx, p.img, p.x, p.y, p.w, p.h);
  });
  if (frameImg) ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  drawCanvas();
  const link = document.createElement('a');
  link.download = 'flashpop_export.jpg';
  link.href = canvas.toDataURL('image/jpeg', 1.0);
  link.click();
});

  document.getElementById("templatePick").addEventListener("click", function(){
    document.getElementById("frameInput").click();
});
  
document.getElementById('frameInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const img = new Image();
  img.onload = () => {
    frameImg = img;
    overlay.style.display = 'none';
    // show labels on dropzones now that frame is selected
    canvasWrapper.querySelectorAll('.drop-zone').forEach(z => {
      z.setAttribute('data-label', 'Drop Photo or Browse');
    });
    drawCanvas();
  };
  img.src = URL.createObjectURL(file);
});

document.getElementById('frameSelector').addEventListener('change', e => {
  const val = e.target.value;
  clearDropZones();
  frameImg = null;
  overlay.style.display = 'block';
  photos = [];

  const templates = {
    '1photo': { w: 1200, h: 1800, zones: [[115, 112, 970, 1455]] },
    '1photolandscape': { w: 1800, h: 1200, zones: [[230, 113, 1340, 895]] },
    '2photo': { w: 1800, h: 1200, zones: [[330, 175, 525, 707], [945, 175, 525, 707]] },
	'Bundling': { w: 1200, h: 1800, zones: [[117, 117, 966, 646], [116, 819, 455, 682], [628, 819, 455, 682]] },
    '4photo': { w: 1200, h: 1800, zones: [[115, 147, 469, 702], [617, 147, 469, 702], [115, 884, 469, 702], [617, 884, 469, 702]] },
    '6photo': { w: 1200, h: 1800, zones: [[58, 117, 514, 407], [629, 117, 514, 407], [58, 580, 514, 407], [629, 580, 514, 407], [58, 1044, 514, 407], [629, 1044, 514, 407]] },
    'filmstrip': { w: 1200, h: 1800, zones: [[58, 87, 485, 327], [659, 87, 485, 327], [58, 440, 485, 327], [659, 440, 485, 327], [58, 792, 485, 327], [659, 792, 485, 327], [58, 1144, 485, 327], [659, 1144, 485, 327]] }
  };

  const t = templates[val];
  canvas.width = t.w;
  canvas.height = t.h;
  canvas.style.width = t.w + 'px';
  canvas.style.height = t.h + 'px';

  t.zones.forEach((z, i) => setupDropZone(`drop${i + 1}`, i, ...z));
  drawCanvas();
});

document.getElementById('frameSelector').dispatchEvent(new Event('change'));

document.getElementById("printBtn").addEventListener("click", function () {
  drawCanvas();
  const canvas = document.getElementById("canvas");
  const imgData = canvas.toDataURL("image/jpeg", 1.0);
  const isPortrait = canvas.height >= canvas.width;
  const width = isPortrait ? "4in" : "6in";
  const height = isPortrait ? "6in" : "4in";
  const printWindow = document.createElement("iframe");
  printWindow.style.position = "fixed";
  printWindow.style.right = "0";
  printWindow.style.bottom = "0";
  printWindow.style.width = "0";
  printWindow.style.height = "0";
  printWindow.style.border = "0";
  document.body.appendChild(printWindow);
  const doc = printWindow.contentWindow.document;
  doc.open();
  doc.write(`
    <html>
    <head>
      <title>Print</title>
      <style>
        @page {
          size: ${width} ${height};
          margin: 0;
        }
        html, body {
          margin:0;
          padding:0;
        }
        img{
          width:${width};
          height:${height};
          object-fit:contain;
        }
      </style>
    </head>
    <body>
      <img src="${imgData}">
    </body>
    </html>
  `);
  doc.close();
  printWindow.onload = function () {
    setTimeout(() => {
      printWindow.contentWindow.focus();
      printWindow.contentWindow.print();
      setTimeout(() => {
        document.body.removeChild(printWindow);
      }, 1000);
    }, 200);
  };
});
  
function togglePopup() {
  const popup = document.getElementById("popupCard");
  popup.style.display = popup.style.display === "none" ? "block" : "none";
}
  
function showPopup() {
  const overlay = document.getElementById("popupOverlay");
  overlay.classList.add("active");
}
  
function hidePopup() {
  const overlay = document.getElementById("popupOverlay");
  overlay.classList.remove("active");
}


</script>
</body>
</html>
